<!DOCTYPE html>
<html>

<head>

<title>

Register

</title>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="auth-container">

<div class="auth-form">

<h2>

Register

</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button
id="registerBtn">

Register

</button>

<p>

Already have account?

<a href="index.html">

Login

</a>

</p>

</div>

</div>

<script
type="module"
src="js/auth.js">

</script>

</body>
</html>
