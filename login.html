<!DOCTYPE html>
<html>

<head>

  <title>Login</title>

  <link rel="stylesheet"
  href="css/style.css">

</head>

<body>

<div class="auth-container">

  <div class="auth-form">

    <h2>Login</h2>

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button id="loginBtn">

      Login

    </button>

    <p>

      No account?

      <a href="register.html">
        Register
      </a>

    </p>

  </div>

</div>

<script
type="module"
src="js/auth.js">
</script>

</body>
</html>
